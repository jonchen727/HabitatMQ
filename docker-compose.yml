# HabitatMQ — Docker Compose
#
# Quick start:
#   docker compose up -d
#
# Access the dashboard at http://localhost:3003
#
# Data is persisted in ./data/ (SQLite database).
# To add cameras, configure them in the dashboard Config page.

services:
  habitatmq:
    image: ghcr.io/jonchen727/habitatmq:latest
    build:
      context: .
      platforms:
        - linux/arm64
        - linux/amd64
    ports:
      - "3003:3003"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - PORT=3003
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - MQTT_TOPIC_PREFIX=enclosure
    depends_on:
      - mosquitto
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "1880:9001"   # WebSocket (for browser MQTT client)
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    command: >
      sh -c 'echo "listener 1883 0.0.0.0
      allow_anonymous true
      listener 9001 0.0.0.0
      protocol websockets" > /mosquitto/config/mosquitto.conf &&
      mosquitto -c /mosquitto/config/mosquitto.conf'
    restart: unless-stopped

  # Optional: go2rtc for zero-transcode camera streaming
  # Uncomment if you want camera support with RTSP/ONVIF cameras
  #
  # go2rtc:
  #   image: alexxit/go2rtc:latest
  #   ports:
  #     - "1984:1984"   # API + WebSocket
  #     - "8554:8554"   # RTSP
  #   volumes:
  #     - ./go2rtc.yaml:/config/go2rtc.yaml
  #   restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-log:
